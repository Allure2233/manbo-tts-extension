<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>曼波配音</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{width:280px;font-family:"Microsoft YaHei","PingFang SC",-apple-system,sans-serif;background:linear-gradient(135deg,#1a1a2e,#16213e 50%,#0f3460);color:#e0e0e0;user-select:none}
    .header{background:linear-gradient(135deg,#667eea,#764ba2);padding:14px 18px;text-align:center}
    .header h1{font-size:17px;font-weight:700;color:#fff}
    .main{padding:12px 18px}
    .row{display:flex;align-items:center;justify-content:space-between;background:rgba(255,255,255,0.05);border-radius:10px;padding:10px 12px;margin-bottom:8px}
    .label{font-size:13px;font-weight:600}
    .switch{position:relative;width:44px;height:24px}
    .switch input{opacity:0;width:0;height:0}
    .slider-bg{position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background:rgba(255,255,255,0.2);border-radius:24px;transition:0.3s}
    .slider-bg:before{content:"";position:absolute;height:18px;width:18px;left:3px;bottom:3px;background:white;border-radius:50%;transition:0.3s}
    input:checked+.slider-bg{background:linear-gradient(135deg,#667eea,#764ba2)}
    input:checked+.slider-bg:before{transform:translateX(20px)}
    .eng-row{display:flex;gap:6px;margin-bottom:10px}
    .eng-btn{flex:1;padding:10px 6px;border-radius:10px;border:1px solid rgba(255,255,255,0.12);background:rgba(255,255,255,0.04);color:#999;cursor:pointer;font-size:11px;text-align:center;transition:0.2s}
    .eng-btn.active{border-color:#667eea;background:rgba(102,126,234,0.15);color:#aabbf0;font-weight:600}
    .eng-btn:hover{background:rgba(255,255,255,0.1)}
    .eng-btn .icon{font-size:20px;display:block;margin-bottom:2px}
    .status{display:flex;align-items:center;gap:6px;margin:8px 0;font-size:11px;color:#aaa}
    .dot{width:7px;height:7px;border-radius:50%;background:#4caf50;animation:pulse 2s infinite}
    .dot.off{background:#666;animation:none}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
    input[type=text]{width:100%;padding:8px;border-radius:8px;border:1px solid rgba(255,255,255,0.12);background:rgba(255,255,255,0.05);color:#ccc;font-size:11px;outline:none}
    input[type=text]:focus{border-color:#667eea}
    .setting{margin-bottom:8px}
    .setting .title{font-size:11px;color:#999;margin-bottom:4px;display:flex;justify-content:space-between}
    .setting .title span{color:#aaa}
    input[type=range]{-webkit-appearance:none;width:100%;height:4px;background:rgba(255,255,255,0.12);border-radius:4px;outline:none}
    input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;background:#667eea;border-radius:50%;cursor:pointer}
    input[type=range]::-moz-range-thumb{width:16px;height:16px;background:#667eea;border-radius:50%;cursor:pointer;border:none}
    .section-title{font-size:11px;color:#667eea;font-weight:600;margin:8px 0 6px;cursor:pointer}
    .section-title:after{content:' ▼';font-size:9px}
    .section-title.collapsed:after{content:' ▶'}
    .collapsed+.section-body{display:none}
    .hint{font-size:10px;color:#555;margin-top:4px;line-height:1.5}
    .btn{display:block;width:100%;padding:8px;border:1px solid rgba(102,126,234,0.3);background:rgba(102,126,234,0.1);color:#8899ee;border-radius:8px;cursor:pointer;font-size:12px;transition:0.2s;margin-top:6px}
    .btn:hover{background:rgba(102,126,234,0.2)}
    .footer{text-align:center;padding:4px 18px 12px;font-size:10px;color:#555}
    .divider{height:1px;background:rgba(255,255,255,0.08);margin:10px 0}
  </style>
</head>
<body>
  <div class="header"><h1>🎙️ 曼波配音</h1></div>
  <div class="main">
    <div class="row">
      <span class="label">🔊 悬停朗读</span>
      <label class="switch"><input type="checkbox" id="tb" checked><span class="slider-bg"></span></label>
    </div>

    <!-- 引擎选择 -->
    <div class="eng-row">
      <button class="eng-btn active" data-engine="mimo"><span class="icon">🤖</span>MiMo 本地</button>
      <button class="eng-btn" data-engine="volcano"><span class="icon">☁️</span>火山引擎</button>
      <button class="eng-btn" data-engine="manbo"><span class="icon">🌐</span>中转站</button>
    </div>

    <div class="status"><span class="dot" id="sd"></span><span id="st">已启用</span></div>

    <!-- MiMo 配置 -->
    <div class="section-title" id="mimoCfg">🤖 MiMo TTS Studio 配置</div>
    <div class="section-body" id="mimoBody">
      <div class="setting">
        <div class="title">端口</div>
        <input type="text" id="mimoPort" placeholder="3000">
      </div>
      <div class="hint">确保 MiMo TTS Studio 已运行<br>先在网页端克隆声音，再用扩展朗读</div>
    </div>

    <!-- 火山引擎配置 -->
    <div class="section-title" id="volcCfg">☁️ 火山引擎配置</div>
    <div class="section-body" id="volcBody">
      <div class="setting">
        <div class="title">API Key</div>
        <input type="text" id="volcKey" placeholder="粘贴 x-api-key">
      </div>
      <div class="setting">
        <div class="title">音色</div>
        <div class="eng-row">
          <button class="eng-btn active" data-voice="manbo"><span class="icon">🎙️</span>曼波</button>
          <button class="eng-btn" data-voice="jelpeta"><span class="icon">🎤</span>杰尔佩塔</button>
        </div>
      </div>
    </div>

    <!-- 中转站 -->
    <div class="hint" id="manboHint">🌐 中转站无需配置，每天 50 次限制</div>

    <div class="divider"></div>

    <!-- 通用设置 -->
    <div class="section-title" id="genCfg">⚙️ 通用设置</div>
    <div class="section-body" id="genBody">
      <div class="setting"><div class="title">🔉 音量 <span id="volVal">100%</span></div><input type="range" id="vol" min="10" max="100" value="100" step="5"></div>
      <div class="setting"><div class="title">⏩ 语速 <span id="spdVal">1.0x</span></div><input type="range" id="spd" min="50" max="200" value="100" step="5"></div>
      <div class="setting"><div class="title">⏱️ 悬停延迟 <span id="dlyVal">300ms</span></div><input type="range" id="dly" min="100" max="1000" value="300" step="50"></div>
    </div>

    <button class="btn" id="test">🔊 测试朗读</button>
  </div>
  <div class="footer">曼波配音 v3.2</div>
  <script src="popup.js"></script>
</body>
</html>
